version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/board"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "cargo"
    directory: "/contract"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
