name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality & Rust Build ────────────────────
  quality-and-wasm:
    name: "Stage 1 · Quality & Rust Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: board/package-lock.json

      - name: Install Node dependencies
        run: cd board && npm ci

      - name: Lint Next.js
        run: cd board && npm run lint

      - name: Typecheck Next.js
        run: cd board && npm run typecheck

      - name: Run Unit Tests
        run: cd board && npm run test

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build Rust WASM Contract
        run: cargo build --manifest-path contract/Cargo.toml --target wasm32-wasip2 --release

  # ── STAGE 2: Security Gate ────────────────────────────────
  security-audit:
    name: "Stage 2 · Security Gate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: board/package-lock.json

      - name: Install Node dependencies
        run: cd board && npm ci

      - name: Audit Node Dependencies
        run: cd board && npm audit --audit-level=high
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality-and-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: board/package-lock.json

      - name: Install Node dependencies
        run: cd board && npm ci

      - name: Next.js Production Build
        run: cd board && npm run build

      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "─────────────────────"
          if [ -d "board/.next" ]; then
            TOTAL_SIZE=$(du -sk board/.next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 3000 ]; then
              echo "::error::Bundle size ${TOTAL_SIZE}KB exceeds 3000KB threshold"
              exit 1
            else
              echo "✅ Bundle size within budget"
            fi
          fi

  # ── STAGE 4: E2E Tests ────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: board/package-lock.json

      - name: Install Node dependencies
        run: cd board && npm ci

      - name: Install Playwright Browsers
        run: cd board && npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: cd board && npm run e2e
        continue-on-error: true # Playwright shims run in demo mode

  # ── STAGE 5: Performance ──────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: board/package-lock.json

      - name: Install Node dependencies
        run: cd board && npm ci

      - name: Run Performance Audit
        run: cd board && npm run lighthouse
        continue-on-error: true

  # ── STAGE 6: Deploy Gate ──────────────────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build, e2e, performance, security-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Complete
        run: echo "🚀 All CI/CD gates passed successfully!"
